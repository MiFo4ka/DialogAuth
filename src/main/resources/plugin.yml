name: DialogAuth
author: MiFo
version: '1.0'
main: fun.vespera.dialogAuth.DialogAuth
api-version: '1.21'
commands:
  changepassword:
    description: Change your password
    aliases: [changepass]
  license:
    description: Enable premium mode for your account
  forceunreg:
    description: Delete a player's registration
    permission: dialogauth.admin
  forcechangepass:
    description: Change a player's password forcefully
    permission: dialogauth.admin
  dauth:
    description: Plugin management command
    permission: dialogauth.admin
